<!doctype html>
<html xmlns:th="http://thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Atualizar produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body data-bs-theme="dark">
    <main>
        <section class="container-md d-flex justify-content-center align-items-center w-100 vh-100">
            <!-- th:action="@{/cadastrar}" th:object="${produto}" method="post" -->
            <form th:object="${produto}" class="w-50 d-flex flex-column p-3 rounded border small">
                <h4 class="p-2">Editar produto</h4>
                <div class="mb-2">
                    <label for="nome" class="form-label ">Nome</label>
                    <input type="text" th:field="*{nome}" th:value="${produto.nome}" class="form-control">
                    <!-- <div th:if="${erroNome}" >
                        <span th:text="${erroNome}" class="text-danger small"></span>
                    </div> -->
                </div>
                <div class="mb-2">
                    <label for="descricao" class="form-label">Descrição</label>
                    <input type="text" th:field="*{descricao}" th:value="${produto.descricao}" class="form-control">
                </div>
                <div class="mb-2">
                    <label for="preco" class="form-label">Preço</label>
                    <input type="number" th:field="*{preco}" th:value="${produto.preco}" step="00.01" placeholder="Preço do produto" class="form-control">
                    <!-- <div th:if="${erroPreco}" >
                        <span th:text="${erroPreco}" class="text-danger small"></span>
                    </div> -->
                </div>
                <div class="mb-2">
                    <label for="categoria" class="form-label">Categoria</label>
                    <select th:field="*{categoria}" th:value="${produto.categoria}" class="form-select">
                        <option value="Eletrônico">Eletrônico</option>
                        <option value="Vestuário">Vestuário</option>
                        <option value="Alimento">Alimento</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div class="mb-2">
                    <label for="estoque" class="form-label">Quantidade em estoque</label>
                    <input type="number" th:field="*{estoque}" th:value="${produto.estoque}" placeholder="Exemplares" class="form-control">
                </div>
                <button type="submit" class="p-2 mt-3 mb-2 btn btn-primary rounded border border-0">Editar produto</button>
                <a th:href="@{/lista}" class="text-center">Ver Lista de Produtos</a>
            </form>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-YUe2LzmiqMDlrzKO8jPRGLKTQMjGxSFGKxf6hXbgTerSM8eNvjxoJFmFIXuIOYv" crossorigin="anonymous"></script>
</body>
</html>
