<!doctype html>
<html xmlns:th="http://thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body data-bs-theme="dark">
    <main class="d-flex justify-content-center align-items-start min-vh-100 py-5">
        <section class="container card p-4">
            <div class="mb-3 d-flex align-items-center gap-3">
                <a href="/" class="btn btn-outline-secondary btn-sm">← Voltar</a>
                <h4 class="card-title m-0">Lista de Produtos</h4>
            </div>

            <div th:if="${#lists.isEmpty(produtos)}" class="card-body">
                <p class="card-text text-muted">Nenhum produto encontrado.</p>
            </div>

            <div th:unless="${#lists.isEmpty(produtos)}" class="table-responsive">
                <span th:text="${#vars.contador}"></span>
                <table class="table table-hover table-bordered align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Nome</th>
                            <th>Descrição</th>
                            <th>Preço</th>
                            <th>Categoria</th>
                            <th>Qtd. em Estoque</th>
                            <th class="text-center">Ação</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="produto, iterStat: ${produtos}">
                            <td th:text="${produto.nome}"></td>
                            <td th:text="${produto.descricao}"></td>
                            <td th:text="${produto.preco}"></td>
                            <td th:text="${produto.categoria}"></td>
                            <td th:text="${produto.estoque}"></td>
                            <td class="text-center">
                                <a th:href="@{/deletar/id(id=${iterStat.index})}" class="btn btn-danger btn-sm">Remover</a>
                                <span th:text="${#vars.contador=iterStat.count}"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <span th:text="${#vars.contador}"></span>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-YUe2LzmiqMDlrzKO8jPRGLKTQMjGxSFGKxf6hXbgTerSM8eNvjxoJFmFIXuIOYv" crossorigin="anonymous"></script>
</body>
</html>
