<!doctype html>
<html xmlns:th="http://thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="conteiner">
            <h1>Lista de Produtos</h1>
            <div th:if="${#lists.isEmpty(produtos)}">
                <p>Nenhum produto encontrado</p>
            </div>
            <table th:unless="${#lists.isEmpty(produtos)}">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Quantidade</th>
                    </tr>
                </thead>
                <tr th:each="produto, iterStat: ${produtos}">
                    <td><span th:text="${produto.nome}"></span></td>
                    <td><span th:text="${produto.preco}"></span></td>
                    <td><span th:text="${produto.categoria}"></span></td>
                </tr>
            </table>
            <a href="/">Voltar</a>
        </div>
    </main>
</body>
</html>
