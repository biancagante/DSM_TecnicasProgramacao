<!doctype html>
<html xmlns:th="http://thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar produto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="conteiner">
            <h1>Cadastrar produto</h1>
            <form th:action="@{/cadastrar}" th:object="${produto}" method="post">
                <label for="nome">Nome</label>
                <input type="text" th:field="*{nome}" placeholder="Nome do produto">
                <label for="preco">Preço</label>
                <input type="text" th:field="*{preco}" placeholder="Preço do produto">
                <label for="categoria">Categoria</label>
                <input type="text" th:field="*{categoria}" placeholder="Categoria do produto">
                <button type="submit">Cadastrar</button>
            </form>
            <a th:href="@{/lista}">Ver Lista de Produtos</a>
        </div>
    </main>
</body>
</html>
